<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Auto Hide - Edge store screenshot 1</title>
    <link rel="stylesheet" href="store.css">
  </head>
  <body class="store-body">
    <main class="store-canvas store-canvas--popup">
      <section class="store-copy">
        <div class="store-brand">
          <img class="store-brand__mark" src="../../../docs/assets/brand.svg" alt="">
          <div class="store-brand__text">
            <p class="eyebrow">Cursor Auto Hide</p>
            <h1>Simple popup.<br>Cleaner typing.</h1>
          </div>
        </div>

        <p class="lede">
          Turn the extension on once and keep the mouse pointer out of the way while you type in editable controls.
        </p>

        <div class="chip-row" aria-label="Highlights">
          <span class="chip">Edge add-on</span>
          <span class="chip">No data collection</span>
          <span class="chip">One global toggle</span>
        </div>
      </section>

      <section class="popup-stage" aria-label="Popup preview">
        <img class="popup-preview" src="../popup-preview.png" alt="Cursor Auto Hide popup preview">
      </section>
    </main>
  </body>
</html>
