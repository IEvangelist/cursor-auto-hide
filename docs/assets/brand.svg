<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Cursor Auto Hide brand mark</title>
  <desc id="desc">A glowing code prompt with a blinking caret beside a pointer arrow.</desc>
  <defs>
    <linearGradient id="surface" x1="28" y1="24" x2="228" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.56" stop-color="#111c3d"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(190 66) rotate(120) scale(120 146)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <style>
    .mono {
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 74px;
      font-weight: 700;
      letter-spacing: -8px;
    }

    .caret {
      animation: blink 1.15s steps(2, end) infinite;
      transform-origin: center;
    }

    @keyframes blink {
      0%,
      48% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0.18;
      }
    }
  </style>

  <g filter="url(#softShadow)">
    <rect x="20" y="20" width="216" height="216" rx="46" fill="url(#surface)"/>
    <rect x="20" y="20" width="216" height="216" rx="46" fill="url(#glow)"/>
    <rect x="20" y="20" width="216" height="216" rx="46" fill="none" stroke="rgba(226,232,240,0.18)"/>

    <rect x="38" y="48" width="132" height="76" rx="24" fill="rgba(15,23,42,0.56)" stroke="rgba(148,163,184,0.22)"/>
    <text x="62" y="99" class="mono" fill="#e2e8f0">&gt;</text>
    <rect class="caret" x="114" y="61" width="18" height="46" rx="9" fill="#67e8f9"/>

    <path d="M148 120v90l27-24 18 41 23-11-17-41h29l-80-55z" fill="#f8fafc"/>
    <path d="M159 141v46l15-13 12 27 10-5-12-27h20l-45-28z" fill="#22d3ee" opacity="0.22"/>
  </g>
</svg>
