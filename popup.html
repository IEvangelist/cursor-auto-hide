<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Auto Hide</title>
    <link rel="icon" href="docs/assets/brand.svg" type="image/svg+xml">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <section class="popup__hero">
        <div class="popup__copy">
          <p class="popup__eyebrow">Cursor Auto Hide</p>
          <h1>Hide the pointer while you type.</h1>
          <p class="popup__lede">
            Clean, native-feeling text entry for Chrome and Edge with one simple global toggle.
          </p>
        </div>

        <object class="popup__brand" data="docs/assets/brand.svg" type="image/svg+xml" tabindex="-1"></object>
      </section>

      <label class="toggle-card" for="enabledToggle">
        <span class="toggle-card__copy">
          <strong>Enabled on all sites</strong>
          <span id="statusText">Hides the pointer while typing in editable controls.</span>
        </span>

        <span class="toggle-switch">
          <input id="enabledToggle" type="checkbox">
          <span class="toggle-switch__track">
            <span class="toggle-switch__thumb"></span>
          </span>
        </span>
      </label>

      <div class="popup__chips" aria-label="Supported fields">
        <span>input</span>
        <span>textarea</span>
        <span>contenteditable</span>
      </div>

      <footer class="popup__footer">
        <p class="popup__hint">
          The pointer returns on movement, click, scroll, blur, tab switch, or after a short idle timeout.
        </p>
        <p id="versionText" class="popup__version"></p>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
